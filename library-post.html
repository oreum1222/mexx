<script src="library-data.js"></script>
<script>
  function toggleTheme(){var d=document.documentElement,light=d.classList.toggle('light');d.classList.toggle('dark',!light);try{localStorage.setItem('mexx-theme',light?'light':'dark');}catch(e){}var ic=document.getElementById('theme-icon');if(ic)ic.textContent=light?'dark_mode':'light_mode';var lb=document.getElementById('theme-label');if(lb)lb.textContent=light?'어두운 화면 버전':'밝은 화면 버전';var m=document.querySelector('meta[name=theme-color]');if(m)m.content=light?'#f6f8fc':'#0a0c10';}
  (function(){var nav=document.querySelector('nav');if(!nav)return;var kakao=nav.querySelector('a[href*="pf.kakao.com"]');var light=document.documentElement.classList.contains('light');var btn=document.createElement('button');btn.id='theme-toggle';btn.setAttribute('aria-label','다크/라이트 모드 전환');btn.title='다크/라이트 전환';btn.className='h-10 px-3 rounded-lg border border-outline-variant text-on-surface-variant hover:text-secondary hover:border-secondary transition-colors flex items-center gap-1.5 shrink-0';btn.innerHTML='<span class="material-symbols-outlined text-[20px]" id="theme-icon">'+(light?'dark_mode':'light_mode')+'</span><span id="theme-label" class="hidden sm:inline font-label-md text-label-md font-bold whitespace-nowrap">'+(light?'어두운 화면 버전':'밝은 화면 버전')+'</span>';btn.onclick=toggleTheme;if(kakao&&kakao.parentElement){kakao.parentElement.insertBefore(btn,kakao);}else{nav.appendChild(btn);}})();

  // ---- 유틸 ----
  var qs=new URLSearchParams(location.search); var POSTID=qs.get('p')||'';
  var POST=(window.MEXX_LIBRARY||[]).find(function(p){return p.id===POSTID;});
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function highlightAns(h){return h.replace(/((?:따라서\s*|즉\s*)?정답은[^.。]*이다\.)/g,'<mark class="ans">$1</mark>');}
  function b64(s){var b=atob(s),u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
  async function deriveKey(pw,salt){var enc=new TextEncoder();var km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);}
  async function decryptBlob(pw,blob){var salt=b64(blob.salt),iv=b64(blob.iv),ct=b64(blob.ct);var key=await deriveKey(pw,salt);var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);return JSON.parse(new TextDecoder().decode(pt));}

  // ---- 메타 표시 ----
  if(POST){
    document.getElementById('lock-title').textContent=POST.title;
    document.getElementById('post-title').textContent=POST.title;
    document.getElementById('meta-cat').textContent=POST.category||'자료';
    document.title=POST.title+' | 김가경 국어 · 한티 MEXX';
  } else {
    document.getElementById('lock-title').textContent='자료를 찾을 수 없습니다';
    document.getElementById('pw').disabled=true;document.getElementById('pw-btn').disabled=true;
  }

  var DATA=null;
  function render(items){
    var host=document.getElementById('content');
    var html=items.map(function(it){
      return '<article id="q'+it.seq+'" class="qcard bg-surface-container-lowest border border-outline-variant rounded-2xl p-5 md:p-6 mb-4" data-seq="'+it.seq+'" data-text="'+esc(it.text).replace(/"/g,'&quot;').toLowerCase()+'">'
        +'<div class="flex items-center gap-2 mb-3"><span class="inline-flex items-center justify-center min-w-[34px] h-[26px] px-2 rounded-lg bg-secondary text-on-secondary font-bold text-[13px]">'+it.seq+'</span><span class="text-on-surface-variant text-[12px]">문항 '+it.seq+'</span></div>'
        +'<div class="qbody font-body-md text-[15px] text-on-surface">'+highlightAns(esc(it.text)).replace(/\n/g,'<br>')+'</div>'
      +'</article>';
    }).join('');
    host.innerHTML=html;
    document.getElementById('foot-count').textContent=items.length;
  }
  function applySearch(){
    if(!DATA)return; var q=document.getElementById('search').value.trim().toLowerCase();
    var cards=document.querySelectorAll('#content .qcard'); var shown=0;
    cards.forEach(function(c){
      var seq=c.getAttribute('data-seq'); var txt=c.getAttribute('data-text');
      var hit=!q || seq===q || (/^\d+$/.test(q)? seq===q : txt.indexOf(q)>-1);
      c.style.display=hit?'':'none'; if(hit)shown++;
    });
    document.getElementById('count').textContent='총 '+DATA.length+'개 중 '+shown+'개 표시';
  }

  async function unlock(pw){
    var err=document.getElementById('pw-err'); err.textContent='';
    var btn=document.getElementById('pw-btn'); btn.disabled=true; btn.style.opacity=.6;
    try{
      // 암호문 로드 (post-<id>.js → window.MEXX_POSTDATA[id])
      if(!(window.MEXX_POSTDATA&&window.MEXX_POSTDATA[POSTID])){
        await new Promise(function(res,rej){var s=document.createElement('script');s.src=POST.data;s.onload=res;s.onerror=function(){rej(new Error('자료 파일을 불러오지 못했습니다.'));};document.head.appendChild(s);});
      }
      var blob=window.MEXX_POSTDATA[POSTID];
      DATA=await decryptBlob(pw,blob);
      DATA.sort(function(a,b){return a.seq-b.seq;});
      render(DATA); applySearch();
      document.getElementById('post-sub').textContent='총 '+DATA.length+'개 문항 해설';
      document.getElementById('lock').classList.add('hidden');
      document.getElementById('page').classList.remove('hidden');
    }catch(e){
      err.textContent=(e&&e.message&&/불러오/.test(e.message))?e.message:'비밀번호가 올바르지 않습니다.';
      btn.disabled=false; btn.style.opacity=1;
      document.getElementById('pw').select();
    }
  }
  document.getElementById('lock-form').addEventListener('submit',function(e){e.preventDefault();var pw=document.getElementById('pw').value;if(pw)unlock(pw);});
  document.getElementById('search').addEventListener('input',applySearch);

  // 복사/우클릭 차단 (본문)
  (function(){var c=document.getElementById('content');['contextmenu','copy','cut','dragstart','selectstart'].forEach(function(ev){c.addEventListener(ev,function(e){e.preventDefault();});});})();
</script>
